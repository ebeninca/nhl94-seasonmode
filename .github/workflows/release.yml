name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx vite build

      - name: Zip dist
        run: cd dist && zip -r ../nhl94-seasonmode-${{ github.ref_name }}.zip .

      - uses: softprops/action-gh-release@v2
        with:
          files: nhl94-seasonmode-${{ github.ref_name }}.zip
